<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UTSAV Key System</title>

<style>
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

body {
    display: flex;
    flex-direction: row;
}

/* 💻 કમ્પ્યુટર માટે સાઇડબાર */
.sidebar {
    width: 240px;
    min-width: 240px;
    background: #111827;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-size: 14px;
    font-weight: bold;
}

/* કન્ટેન્ટ એરિયા */
.content {
    flex: 1;
    padding: 30px;
    width: 100%;
}

.section {
    display: none;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
}

.active {
    display: block;
}

input, select {
    width: 100%;
    max-width: 350px;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #334155;
    color: white;
    font-size: 14px;
    display: block;
    margin-bottom: 15px;
}

button.action-btn {
    width: 100%;
    max-width: 350px;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #10b981;
    color: white;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

/* 🔐 લોગિન કન્ટેનર: આખા પેજની વચ્ચે લાવવા માટે */
.login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    padding: 20px;
}

#loginBox {
    width: 100%;
    max-width: 360px;
    padding: 30px;
    background: #1e293b;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

#loginBox h1 {
    margin-top: 0;
    font-size: 24px;
    margin-bottom: 25px;
}

#loginBox input, #loginBox button {
    max-width: 100%;
    margin-left: auto;
    margin-right: auto;
}

/* 📱 ફોનની સ્ક્રીન માટે (Mobile Responsive) */
@media (max-width: 768px) {
    body {
        flex-direction: column;
    }
    
    .sidebar {
        width: 100%;
        min-width: 100%;
        height: auto;
        padding: 15px;
    }
    
    .sidebar h2 {
        margin-bottom: 10px;
    }
    
    .sidebar button {
        margin: 4px 0;
        padding: 10px;
    }
    
    .content {
        padding: 15px;
    }
    
    .section {
        padding: 15px;
    }
    
    input, select, button.action-btn {
        max-width: 100%;
    }
    
    .login-container {
        height: 100vh; /* લોગિન સ્ક્રીન ફોનમાં પણ બરાબર વચ્ચે જ રહેશે */
    }
}
</style>
</head>

<body>

<!-- લોગિન બોક્સને વચ્ચે સેટ કરવા માટે આ કન્ટેનર ઉમેર્યું -->
<div class="login-container" id="loginWrapper">
    <div id="loginBox">
        <h1>🔐 Admin Login</h1>
        <input id="adminUser" placeholder="Username">
        <input id="adminPass" type="password" placeholder="Password">
        <button class="action-btn" onclick="adminLogin()">Login</button>
        <p id="loginMsg" style="margin-bottom: 0; color: #ef4444;"></p>
    </div>
</div>

<div class="sidebar" style="display:none;">
    <h2>UTSAV</h2>
    <button onclick="show('generate')">🔑 Key Generate</button>
    <button onclick="show('info')">📋 Key Information</button>
    <button onclick="show('activate')">🔐 Activation</button>
    <button onclick="show('admin')">👤 Admin</button>
</div>

<div class="content" style="display:none;">
    <div id="generate" class="section active">
        <h1>🔑 Key Generate</h1>
        <select id="plan">
            <option>1 Day</option>
            <option>7 Days</option>
            <option>15 Days</option>
            <option>Permanent</option>
        </select>
        <br>
        <button class="action-btn" onclick="generateKey()">Generate Key</button>
        <h3 id="newKey"></h3>
        <button class="action-btn" style="background:#64748b;" onclick="copyNewKey()">📋 Copy Key</button>
    </div>

    <div id="info" class="section">
        <h1>📋 Key Information</h1>
        <button class="action-btn" onclick="loadKeys()">Refresh Keys</button>
        <div id="keyList"></div>
    </div>

    <div id="activate" class="section">
        <h1>🔐 Activate Key</h1>
        <input id="activeKey" placeholder="Enter Key">
        <input id="deviceId" placeholder="Enter Device ID">
        <button class="action-btn" onclick="activateKey()">Activate</button>
        <h3 id="activateMsg"></h3>
    </div>

    <div id="admin" class="section">
        <h1>👤 Admin Panel</h1>
        <div id="stats">Loading...</div>
        <br>
        <button class="action-btn" onclick="loadStats()">Refresh Stats</button>
    </div>
</div>

<script>
loadStats();

function adminLogin(){
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    if(user === "ugtm" && pass === "98751"){
        localStorage.setItem("adminLogin","true");
        document.getElementById("loginWrapper").style.display="none"; // આખા કન્ટેનરને હટાવશે
        document.querySelector(".sidebar").style.display="block";
        document.querySelector(".content").style.display="block";
    }else{
        document.getElementById("loginMsg").innerHTML = "Wrong Username or Password";
    }
}

function show(id){
    let sections = document.querySelectorAll(".section");
    sections.forEach(s => { s.classList.remove("active"); });
    document.getElementById(id).classList.add("active");
}

async function generateKey(){
    let plan = document.getElementById("plan").value;
    let response = await fetch("/generate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({plan:plan})
    });
    let data = await response.json();
    if(data.success){
        document.getElementById("newKey").innerHTML = "Generated Key: " + data.key;
    }else{
        alert("Key Generate Error");
    }
}

function copyNewKey(){
    let key = document.getElementById("newKey").innerText;
    if(key === ""){
        alert("પહેલા Key Generate કરો.");
        return;
    }
    navigator.clipboard.writeText(key.replace("Generated Key: ",""));
    alert("Key Copy થઈ ગઈ!");
}

async function loadKeys(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let html = "";
    data.keys.forEach(k => {
        html += `
        <hr>
        <p><b>Key:</b> ${k.key}</p>
        <p><b>Plan:</b> ${k.plan}</p>
        <p><b>Status:</b> ${k.status}</p>
        <p><b>Device:</b> ${k.device_id || "Not Used"}</p>
        <p><b>Expiry:</b> ${k.expires_at}</p>
        <button class="action-btn" style="background:#ef4444; padding:5px 10px; font-size:12px; max-width: 120px;" onclick="deleteKey('${k.key}')">🗑️ Delete Key</button>
        `;
    });
    document.getElementById("keyList").innerHTML = html;
}

async function activateKey(){
    let key = document.getElementById("activeKey").value;
    let device = document.getElementById("deviceId").value;
    let response = await fetch("/activate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key, device_id:device})
    });
    let data = await response.json();
    document.getElementById("activateMsg").innerHTML = data.message;
}

async function loadStats(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let total = data.keys.length;
    let active = data.keys.filter(k => k.status === "active").length;
    let unused = data.keys.filter(k => k.status === "unused").length;
    let disabled = data.keys.filter(k => k.status === "disabled").length;

    document.getElementById("stats").innerHTML = `
    <h3>Total Keys: ${total}</h3>
    <h3>Active Keys: ${active}</h3>
    <h3>Unused Keys: ${unused}</h3>
    <h3>Disabled Keys: ${disabled}</h3>
    `;
}

async function deleteKey(key){
    let response = await fetch("/delete-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key})
    });
    let data = await response.json();
    alert(data.message);
    loadKeys();
}
</script>

</body>
</html>
