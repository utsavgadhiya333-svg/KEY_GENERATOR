<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- 👈 આ લાઇનથી વેબસાઇટ ફોનની સ્ક્રીન સાઇઝ પ્રમાણે આપમેળે સેટ થઈ જશે -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTSAV Key System</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: row; /* કમ્પ્યુટરમાં આજુબાજુ દેખાશે */
    background: #0f172a;
    color: white;
    min-height: 100vh;
}

.sidebar {
    width: 220px;
    background: #111827;
    padding: 20px;
    box-sizing: border-box;
}

.sidebar h2 {
    text-align: center;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-size: 14px;
}

.content {
    flex: 1;
    padding: 20px;
    box-sizing: border-box;
}

.section {
    display: none;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 10px;
}

.active {
    display: block;
}

input, select {
    width: 100%;
    max-width: 300px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #334155;
    color: white;
    box-sizing: border-box;
}

button.action-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #10b981;
    color: white;
    cursor: pointer;
}

/* 👈 જો ફોનની સ્ક્રીન નાની (768px થી ઓછી) હોય તો આ CSS ચાલુ થશે */
@media (max-width: 768px) {
    body {
        flex-direction: column; /* ફોનમાં સાઇડબાર ઉપર અને કન્ટેન્ટ નીચે આવશે */
    }
    .sidebar {
        width: 100%;
        height: auto;
        padding: 15px;
    }
    .sidebar button {
        margin: 4px 0;
    }
    .content {
        padding: 15px;
    }
    input, select {
        max-width: 100%; /* ફોનમાં ઇનપુટ બોક્સ આખી સ્ક્રીન જેટલા મોટા થઈ જશે */
    }
}
</style>
</head>

<body>

<div id="loginBox" style="text-align:center; padding:50px; width: 100%; box-sizing: border-box;">
    <h1>🔐 Admin Login</h1>
    <input id="adminUser" placeholder="Username"><br><br>
    <input id="adminPass" type="password" placeholder="Password"><br><br>
    <button class="action-btn" onclick="adminLogin()">Login</button>
    <p id="loginMsg"></p>
</div>

<div class="sidebar" style="display:none;">
    <h2>UTSAV</h2>
    <button onclick="show('generate')">🔑 Key Generate</button>
    <button onclick="show('info')">📋 Key Information</button>
    <button onclick="show('activate')">🔐 Activation</button>
    <button onclick="show('admin')">👤 Admin</button>
</div>

<div class="content" style="display:none;">
    <div id="generate" class="section active">
        <h1>🔑 Key Generate</h1>
        <select id="plan">
            <option>1 Day</option>
            <option>7 Days</option>
            <option>15 Days</option>
            <option>Permanent</option>
        </select>
        <br><br>
        <button class="action-btn" onclick="generateKey()">Generate Key</button>
        <h3 id="newKey"></h3>
        <button class="action-btn" style="background:#64748b;" onclick="copyNewKey()">📋 Copy Key</button>
    </div>

    <div id="info" class="section">
        <h1>📋 Key Information</h1>
        <button class="action-btn" onclick="loadKeys()">Refresh Keys</button>
        <div id="keyList"></div>
    </div>

    <div id="activate" class="section">
        <h1>🔐 Activate Key</h1>
        <input id="activeKey" placeholder="Enter Key"><br><br>
        <input id="deviceId" placeholder="Enter Device ID"><br><br>
        <button class="action-btn" onclick="activateKey()">Activate</button>
        <h3 id="activateMsg"></h3>
    </div>

    <div id="admin" class="section">
        <h1>👤 Admin Panel</h1>
        <div id="stats">Loading...</div>
        <br>
        <button class="action-btn" onclick="loadStats()">Refresh Stats</button>
    </div>
</div>

<script>
loadStats();

function adminLogin(){
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    if(user === "ugtm" && pass === "98751"){
        localStorage.setItem("adminLogin","true");
        document.getElementById("loginBox").style.display="none";
        document.querySelector(".sidebar").style.display="block";
        document.querySelector(".content").style.display="block";
    }else{
        document.getElementById("loginMsg").innerHTML = "Wrong Username or Password";
    }
}

function show(id){
    let sections = document.querySelectorAll(".section");
    sections.forEach(s => { s.classList.remove("active"); });
    document.getElementById(id).classList.add("active");
}

async function generateKey(){
    let plan = document.getElementById("plan").value;
    let response = await fetch("/generate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({plan:plan})
    });
    let data = await response.json();
    if(data.success){
        document.getElementById("newKey").innerHTML = "Generated Key: " + data.key;
    }else{
        alert("Key Generate Error");
    }
}

function copyNewKey(){
    let key = document.getElementById("newKey").innerText;
    if(key === ""){
        alert("પહેલા Key Generate કરો.");
        return;
    }
    navigator.clipboard.writeText(key.replace("Generated Key: ",""));
    alert("Key Copy થઈ ગઈ!");
}

async function loadKeys(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let html = "";
    data.keys.forEach(k => {
        html += `
        <hr>
        <p><b>Key:</b> ${k.key}</p>
        <p><b>Plan:</b> ${k.plan}</p>
        <p><b>Status:</b> ${k.status}</p>
        <p><b>Device:</b> ${k.device_id || "Not Used"}</p>
        <p><b>Expiry:</b> ${k.expires_at}</p>
        <button class="action-btn" style="background:#ef4444; padding:5px 10px; font-size:12px;" onclick="deleteKey('${k.key}')">🗑️ Delete Key</button>
        `;
    });
    document.getElementById("keyList").innerHTML = html;
}

async function activateKey(){
    let key = document.getElementById("activeKey").value;
    let device = document.getElementById("deviceId").value;
    let response = await fetch("/activate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key, device_id:device})
    });
    let data = await response.json();
    document.getElementById("activateMsg").innerHTML = data.message;
}

async function loadStats(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let total = data.keys.length;
    let active = data.keys.filter(k => k.status === "active").length;
    let unused = data.keys.filter(k => k.status === "unused").length;
    let disabled = data.keys.filter(k => k.status === "disabled").length;

    document.getElementById("stats").innerHTML = `
    <h3>Total Keys: ${total}</h3>
    <h3>Active Keys: ${active}</h3>
    <h3>Unused Keys: ${unused}</h3>
    <h3>Disabled Keys: ${disabled}</h3>
    `;
}

async function deleteKey(key){
    let response = await fetch("/delete-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key})
    });
    let data = await response.json();
    alert(data.message);
    loadKeys();
}
</script>

</body>
</html>
