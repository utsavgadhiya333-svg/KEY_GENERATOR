<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UTSAV Key System</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* આખું પેજ લૉક રહેશે, હલશે નહીં */
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

body {
    display: flex;
    flex-direction: row;
}

/* 🔐 લૉગિન કન્ટેનર */
.login-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    padding: 20px;
    background: #0f172a;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    touch-action: none;
}

#loginBox {
    width: 100%;
    max-width: 320px;
    padding: 25px;
    background: #1e293b;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

#loginBox h1 {
    font-size: 22px;
    margin-bottom: 20px;
}

#loginBox input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #475569;
    background: #334155;
    color: white;
    font-size: 14px;
    margin-bottom: 15px;
}

/* ☰ મોબાઇલ મેનુ બટન */
.menu-toggle {
    display: none;
    position: fixed;
    top: 15px;
    left: 15px;
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    z-index: 999;
}

/* 💻 સાઇડબાર સેટિંગ્સ */
.sidebar {
    width: 240px;
    min-width: 240px;
    background: #111827;
    padding: 20px;
    height: 100vh;
    transition: transform 0.3s ease-in-out;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 25px;
    margin-top: 10px;
}

.sidebar button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1e293b;
    color: white;
    font-size: 14px;
    text-align: left;
    padding-left: 15px;
}

.sidebar button:hover {
    background: #2563eb;
}

/* કન્ટેન્ટ એરિયા */
.content {
    flex: 1;
    padding: 30px;
    height: 100vh;
    overflow-y: auto;
    width: 100%;
}

.section {
    display: none;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 100%;
    margin-top: 10px;
}

.section.active {
    display: block;
}

/* ਫੋਰਮ ਐਲੀਮੈਂਟਸ */
input, select {
    width: 100%;
    max-width: 350px;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #475569;
    background: #334155;
    color: white;
    font-size: 14px;
    margin-bottom: 15px;
    display: block;
}

button.action-btn {
    width: 100%;
    max-width: 350px;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #10b981;
    color: white;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
}

/* 📱 મોબાઇલ સ્ક્રીન માટે ફિક્સ રિસ્પોન્સિવ (Sidebar hidden by default) */
@media (max-width: 768px) {
    .menu-toggle {
        display: block;
    }

    /* મોબાઇલમાં સાઇડબાર ડિફોલ્ટ છુપાયેલો જ રહેશે (translateX -100%) */
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 998;
        transform: translateX(-100%); 
        box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    }

    /* જ્યારે મેનુ ઓપન થાય ત્યારે જ બહાર આવશે */
    .sidebar.open {
        transform: translateX(0) !important;
    }

    .content {
        padding: 20px;
        padding-top: 75px;
    }

    input, select, button.action-btn {
        max-width: 100%;
    }
}
</style>
</head>

<body>

<!-- લોગિન સેક્શન -->
<div class="login-container" id="loginWrapper">
    <div id="loginBox">
        <h1>🔐 Admin Login</h1>
        <input id="adminUser" placeholder="Username">
        <input id="adminPass" type="password" placeholder="Password">
        <button class="action-btn" onclick="adminLogin()">Login</button>
        <p id="loginMsg" style="margin-top: 10px; margin-bottom: 0; color: #ef4444; font-size: 14px;"></p>
    </div>
</div>

<!-- મોબાઇલ મેનુ બટન (☰) -->
<button class="menu-toggle" id="menuBtn" style="display:none;" onclick="toggleMenu()">☰ Menu</button>

<!-- ડાબી બાજુનો સાઇડબાર (મોબાઇલમાં શરૂઆતમાં બહાર નહીં આવે) -->
<div class="sidebar" id="sidebar" style="display:none;">
    <h2>UTSAV</h2>
    <button onclick="navigate('generate')">🔑 Key Generate</button>
    <button onclick="navigate('info')">📋 Key Information</button>
    <button onclick="navigate('activate')">🔐 Activation</button>
    <button onclick="navigate('admin')">👤 Admin</button>
</div>

<!-- મેઇન કન્ટેન્ટ એરિયા -->
<div class="content" id="contentArea" style="display:none;">
    <div id="generate" class="section active">
        <h1>🔑 Key Generate</h1>
        <br>
        <select id="plan">
            <option>1 Day</option>
            <option>7 Days</option>
            <option>15 Days</option>
            <option>Permanent</option>
        </select>
        <button class="action-btn" onclick="generateKey()">Generate Key</button>
        <h3 id="newKey" style="margin: 15px 0;"></h3>
        <button class="action-btn" style="background:#64748b;" onclick="copyNewKey()">📋 Copy Key</button>
    </div>

    <div id="info" class="section">
        <h1>📋 Key Information</h1>
        <br>
        <button class="action-btn" onclick="loadKeys()">Refresh Keys</button>
        <div id="keyList"></div>
    </div>

    <div id="activate" class="section">
        <h1>🔐 Activate Key</h1>
        <br>
        <input id="activeKey" placeholder="Enter Key">
        <input id="deviceId" placeholder="Enter Device ID">
        <button class="action-btn" onclick="activateKey()">Activate</button>
        <h3 id="activateMsg" style="margin-top: 15px;"></h3>
    </div>

    <div id="admin" class="section">
        <h1>👤 Admin Panel</h1>
        <br>
        <div id="stats">Loading...</div>
        <br>
        <button class="action-btn" onclick="loadStats()">Refresh Stats</button>
    </div>
</div>

<script>
loadStats();

function adminLogin(){
    let user = document.getElementById("adminUser").value;
    let pass = document.getElementById("adminPass").value;

    if(user === "ugtm" && pass === "98751"){
        localStorage.setItem("adminLogin","true");
        document.getElementById("loginWrapper").style.display="none"; 
        
        // લોગિન થતાં જ બધું દેખાશે પણ સાઇડબાર ક્લાસ મુજબ છુપાયેલો રહેશે
        document.getElementById("menuBtn").style.display="block";
        document.getElementById("sidebar").style.display="block";
        document.getElementById("contentArea").style.display="block";
        
        // ખાતરી કરવા માટે મોબાઇલમાં ઓપન ક્લાસ દૂર રાખવો
        document.getElementById("sidebar").classList.remove("open");
    }else{
        document.getElementById("loginMsg").innerHTML = "Wrong Username or Password";
    }
}

function toggleMenu() {
    let sidebar = document.getElementById("sidebar");
    sidebar.classList.toggle("open");
}

function navigate(id) {
    // કોઈ પણ ઓપ્શન દબાવતા જ મેનુ પાછું અંદર જતું રહેશે
    document.getElementById("sidebar").classList.remove("open");
    
    let sections = document.querySelectorAll(".section");
    sections.forEach(s => { s.classList.remove("active"); });
    document.getElementById(id).classList.add("active");
}

async function generateKey(){
    let plan = document.getElementById("plan").value;
    let response = await fetch("/generate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({plan:plan})
    });
    let data = await response.json();
    if(data.success){
        document.getElementById("newKey").innerHTML = "Generated Key: " + data.key;
    }else{
        alert("Key Generate Error");
    }
}

function copyNewKey(){
    let key = document.getElementById("newKey").innerText;
    if(key === ""){
        alert("પહેલા Key Generate કરો.");
        return;
    }
    navigator.clipboard.writeText(key.replace("Generated Key: ",""));
    alert("Key Copy થઈ ગઈ!");
}

async function loadKeys(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let html = "";
    data.keys.forEach(k => {
        html += `
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #475569;">
        <p><b>Key:</b> ${k.key}</p>
        <p><b>Plan:</b> ${k.plan}</p>
        <p><b>Status:</b> ${k.status}</p>
        <p><b>Device:</b> ${k.device_id || "Not Used"}</p>
        <p><b>Expiry:</b> ${k.expires_at}</p>
        <button class="action-btn" style="background:#ef4444; margin-top:10px; padding:8px; font-size:12px; max-width: 120px;" onclick="deleteKey('${k.key}')">🗑️ Delete Key</button>
        `;
    });
    document.getElementById("keyList").innerHTML = html;
}

async function activateKey(){
    let key = document.getElementById("activeKey").value;
    let device = document.getElementById("deviceId").value;
    let response = await fetch("/activate-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key, device_id:device})
    });
    let data = await response.json();
    document.getElementById("activateMsg").innerHTML = data.message;
}

async function loadStats(){
    let response = await fetch("/all-keys");
    let data = await response.json();
    let total = data.keys.length;
    let active = data.keys.filter(k => k.status === "active").length;
    let unused = data.keys.filter(k => k.status === "unused").length;
    let disabled = data.keys.filter(k => k.status === "disabled").length;

    document.getElementById("stats").innerHTML = `
    <h3 style="margin: 8px 0;">Total Keys: ${total}</h3>
    <h3 style="margin: 8px 0;">Active Keys: ${active}</h3>
    <h3 style="margin: 8px 0;">Unused Keys: ${unused}</h3>
    <h3 style="margin: 8px 0;">Disabled Keys: ${disabled}</h3>
    `;
}

async function deleteKey(key){
    let response = await fetch("/delete-key",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({key:key})
    });
    let data = await response.json();
    alert(data.message);
    loadKeys();
}
</script>

</body>
</html>
